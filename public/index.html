<!DOCTYPE html>
<html>
<head>
  <title>Lunar Registry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    .app {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* BACKGROUND */
    #bg, #bgBlur {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa') center/cover;
    }

    #bg { z-index: -2; }

    #bgBlur {
      filter: blur(8px);
      opacity: 0;
      transition: 0.5s ease;
      z-index: -1;
    }

    #bg::after, #bgBlur::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    .blur-active {
      opacity: 1;
    }

    /* HEADER */
    .header {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      z-index: 5;
    }

    .header h1 {
      font-family: 'Orbitron';
      color: #00f2fe;
      margin: 0;
    }

    .header p {
      color: #ccc;
      font-size: 13px;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      z-index: 5;
    }

    /* SCREEN */
    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 2;
      transition: 0.4s ease;
    }

    /* VERIFY CARD */
    .verify-card {
      width: 100%;
      max-width: 320px;
      padding: 25px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .verify-card input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      text-align: center;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .verify-card button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      cursor: pointer;
      font-weight: bold;
    }

    /* LOADING */
    .loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* RESULT */
    .result {
      position: absolute;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    .image {
      flex: 1 1 300px;
      min-height: 250px;
      background: url(moon.png) center/cover;
    }

    .content {
      flex: 1 1 300px;
      padding: 20px;
      position: relative;
    }

    .tag {
      position: absolute;
      right: 15px;
      top: 15px;
      background: #00c853;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
    }

    h2 {
      font-family: 'Orbitron';
      color: #00f2fe;
      margin: 0;
    }

    .sub {
      color: #ccc;
      margin-bottom: 10px;
    }

    .owner {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .info p {
      margin: 5px 0;
      font-size: 14px;
    }

    .label {
      color: #aaa;
    }

    .btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .map-btn {
      background: linear-gradient(45deg, #4facfe, #00f2fe);
    }

    .download-btn {
      background: #00c853;
      color: white;
    }

    .fade-out {
      opacity: 0;
      pointer-events: none;
    }

    @media(max-width:600px){
      .container { flex-direction: column; }
    }

    .moon-icon {
      display: inline-block;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, #ffffff 60%, #ccc 100%);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
    }

    .logo-text {
  text-decoration: none;
  color: #00f2fe;
  font-family: 'Orbitron';
}

.logo-text:hover {
  opacity: 0.85;
}


  </style>
</head>

<body>

<div class="app">

  <div id="bg"></div>
  <div id="bgBlur"></div>

  <div class="header">
    <h1>
      <span class="moon-icon"></span>
      <a href="https://lunarregistry.com/" target="_blank" class="logo-text">
        The LUNAR REGISTRY
      </a>
    </h1>
    <p>Official Extraterrestrial Property Verification Portal</p>
  </div>

  <div id="verifyScreen" class="screen">
    <div class="verify-card">
      <input id="id" placeholder="Record ID">
      <input id="fileNo" placeholder="File No">
      <button id="verifyBtn" onclick="verify()">🔍 Verify Record</button>
    </div>
  </div>

  <div id="resultScreen" class="result">
    <div class="container">

      <div class="image"></div>

      <div class="content">
        <div class="tag">CLAIMED</div>

        <h2 id="title"></h2>
        <div class="sub" id="location"></div>

        <div class="owner">
          👤 Owner: <span id="ownerName"></span>
        </div>

        <div class="info" id="info"></div>

        <a id="viewMapLink" target="_blank">
          <button class="btn map-btn">🌕 View Lunar Map</button>
        </a>

        <a id="downloadLink" download>
          <button class="btn download-btn">⬇ Download Boarding Pass</button>
        </a>
      </div>

    </div>
  </div>

  <div class="footer">
    © 2026 Lunar Registry Authority • All Rights Reserved
  </div>

</div>

<script>
async function verify() {
  const id = document.getElementById("id").value;
  const fileNo = document.getElementById("fileNo").value;
  const btn = document.getElementById("verifyBtn");

  if (!id || !fileNo) {
    alert("Enter both fields");
    return;
  }

  document.getElementById("id").disabled = true;
  document.getElementById("fileNo").disabled = true;

  btn.classList.add("loading");
  btn.innerHTML = `<span class="spinner"></span> Verifying...`;

  try {
    const [res] = await Promise.all([
      fetch(`http://localhost:3000/verify?id=${id}&fileNo=${fileNo}`),
      new Promise(r => setTimeout(r, 1200))
    ]);

    const data = await res.json();

    if (data.status === "valid") {

      document.getElementById("bgBlur").classList.add("blur-active");

      const verifyScreen = document.getElementById("verifyScreen");
      verifyScreen.classList.add("fade-out");

      setTimeout(() => {
        verifyScreen.style.display = "none";
        document.getElementById("resultScreen").style.display = "flex";
      }, 400);

      document.getElementById("title").innerText = "Somniorum-" + data.data.id;
      document.getElementById("location").innerText = data.data.location;
      document.getElementById("ownerName").innerText = data.data.name;

      document.getElementById("info").innerHTML = `
        <p><span class="label">Token ID:</span> ${data.data.tokenId}</p>
        <p><span class="label">Land Area:</span> ${data.data.land}</p>
        <p><span class="label">Latitude:</span> ${data.data.coordinates.lat}</p>
        <p><span class="label">Longitude:</span> ${data.data.coordinates.long}</p>
        <p><span class="label">Status:</span> ✔ Verified</p>
      `;

      document.getElementById("viewMapLink").href = "https://quickmap.lroc.im-ldi.com/query?showGraticule=true";
      document.getElementById("downloadLink").href = "boarding-pass.png";

    } else {
      throw new Error();
    }

  } catch {
    alert("🚫 No lunar record detected. Verification failed.");;

    document.getElementById("id").disabled = false;
    document.getElementById("fileNo").disabled = false;

    btn.classList.remove("loading");
    btn.innerHTML = "🔍 Verify Record";
  }
}
</script>

</body>
</html>
