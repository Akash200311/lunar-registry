<!DOCTYPE html>
<html>
<head>
  <title>Lunar Registry</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ===== BODY ===== */
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== BACKGROUND IMAGE ===== */
    #bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa');
      background-size: cover;
      background-position: center;
      z-index: -2;
      transition: 0.5s ease;
    }

    /* DARK OVERLAY */
    #bg::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    /* BLUR BACKGROUND ONLY */
    .blur-bg {
      filter: blur(8px);
      transform: scale(1.05);
    }

    .main-content {
      flex: 1;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .header h1 {
      font-family: 'Orbitron';
      color: #00f2fe;
      margin: 0;
    }

    .header p {
      color: #ccc;
      font-size: 13px;
    }

    /* ===== VERIFY ===== */
    .verify-box {
      text-align: center;
      margin: 20px;
    }

    input {
      padding: 12px;
      margin: 5px;
      width: 180px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    /* ===== GLOSSY CARD ===== */
    .container {
      width: 90%;
      max-width: 900px;
      margin: 30px auto;

      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.05)
      );

      backdrop-filter: blur(20px);
      border-radius: 20px;
      display: none;
      flex-wrap: wrap;
      overflow: hidden;

      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);

      position: relative;
      z-index: 2;
    }

    /* GLOSS EFFECT */
    .container::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
      );
      transform: rotate(25deg);
      pointer-events: none;
    }

    .image {
      flex: 1 1 300px;
      background: url(moon.png);
      background-size: cover;
      background-position: center;
      min-height: 250px;
    }

    .content {
      flex: 1 1 300px;
      padding: 20px;
      position: relative;
    }

    .tag {
      position: absolute;
      right: 15px;
      top: 15px;
      background: #00c853;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
    }

    h2 {
      margin: 0;
      font-family: 'Orbitron';
      color: #00f2fe;
    }

    .sub {
      color: #ccc;
      margin-bottom: 15px;
    }

    .owner {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .info p {
      margin: 5px 0;
      font-size: 14px;
    }

    .label {
      color: #aaa;
    }

    /* DOWNLOAD */
    .download-btn {
      margin-top: 15px;
      width: 100%;
      background: linear-gradient(45deg, #00c853, #64dd17);
      color: rgb(255, 255, 255);
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    /* MOBILE */
    @media(max-width: 600px) {
      input {
        width: 90%;
      }

      .verify-box {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      button {
        width: 90%;
      }
    }


    .download-btn {
  margin-top: 15px;
  width: 100%;
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color: rgb(0, 0, 0);
  font-weight: 600;

  border: none;
  border-radius: 10px;

  cursor: pointer;
}


.moon-icon {
  display: inline-block;
  width: 30px;
  height: 30px;

  background: radial-gradient(circle, #ffffff 60%, #ccc 100%);
  border-radius: 50%;

  margin-right: 8px;
  vertical-align: middle;

  box-shadow: 0 0 10px rgba(255,255,255,0.7);
}

h1
{
    color: white;
}
  </style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg"></div>

<div class="main-content">

  <!-- HEADER -->
  <div class="header">
    <h1><span class="moon-icon"></span> The LUNAR REGISTRY</h1>
    <p>Official Extraterrestrial Property Verification Portal</p>
  </div>

  <!-- VERIFY -->
  <div class="verify-box">
    <input id="id" placeholder="Record ID">
    <input id="fileNo" placeholder="File No">
    <button onclick="verify()">Verify</button>
  </div>

  <!-- CARD -->
  <div id="card" class="container">

    <div class="image"></div>

    <div class="content">
      <div class="tag">CLAIMED</div>

      <h2 id="title"></h2>
      <div class="sub" id="location"></div>

      <div class="owner">
        👤 Owner: <span id="ownerName"></span>
      </div>

      <div class="info" id="info"></div>

      <a id="downloadLink" download>
        <button class="download-btn">⬇ Download Boarding Pass</button>
      </a>

    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Lunar Registry Authority • All Rights Reserved
</div>

<script>
async function verify() {
  const id = document.getElementById("id").value;
  const fileNo = document.getElementById("fileNo").value;

  if (!id || !fileNo) {
    alert("Enter both fields");
    return;
  }

  const res = await   fetch(`/verify?id=${id}&fileNo=${fileNo}`);
  const data = await res.json();

  if (data.status === "valid") {

    // ✅ BLUR ONLY BACKGROUND
    document.getElementById("bg").classList.add("blur-bg");

    const card = document.getElementById("card");
    card.style.display = "flex";

    document.getElementById("title").innerText = "Somniorum-" + data.data.id;
    document.getElementById("location").innerText = data.data.location;
    document.getElementById("ownerName").innerText = data.data.name;

    document.getElementById("info").innerHTML = `
      <p><span class="label">Token ID:</span> ${data.data.tokenId}</p>
      <p><span class="label">Land Area:</span> ${data.data.land}</p>
      <p><span class="label">Latitude:</span> ${data.data.coordinates.lat}</p>
      <p><span class="label">Longitude:</span> ${data.data.coordinates.long}</p>
      <p><span class="label">Status:</span> ✔ Verified</p>
    `;

    // 👇 your image file
    document.getElementById("downloadLink").href = "boarding-pass.png";

  } else {
    alert("❌ Invalid Record");
  }
}
</script>

</body>
</html>
